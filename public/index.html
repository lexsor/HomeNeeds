<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>HomeNeeds</title>

  <!-- PWA: manifest + platform meta -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HomeNeeds" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>HomeNeeds</h1>
    <div class="who">
      <label for="whoami">You:</label>
      <input id="whoami" type="text" autocomplete="off" maxlength="20" placeholder="name" />
      <label class="color-label" for="highlight-color">Color:</label>
      <select id="highlight-color" aria-label="Highlight color">
        <option value="#ef4444">Red</option>
        <option value="#f97316">Orange</option>
        <option value="#facc15">Yellow</option>
        <option value="#22c55e">Green</option>
        <option value="#14b8a6">Teal</option>
        <option value="#3b82f6">Blue</option>
        <option value="#a855f7">Purple</option>
        <option value="#ec4899">Pink</option>
      </select>
    </div>
  </header>

  <main>
    <form id="add-form" autocomplete="off">
      <input id="f-name" name="name" type="text" placeholder="Add an item…" required maxlength="80" />
      <input id="f-qty"  name="quantity" type="text" placeholder="qty (e.g. 2, 1lb)" maxlength="40" />
      <input id="f-note" name="notes" type="text" placeholder="notes (brand, aisle…)" maxlength="200" />
      <button type="submit">Add</button>
    </form>

    <!-- Collapsible Favorites panel — shared across the family.
         Tap a tile to one-click re-add it to the list. -->
    <section id="favorites-wrap" hidden>
      <button id="favorites-toggle" type="button" class="favorites-toggle" aria-expanded="false">
        <span class="fav-toggle-label">
          <svg class="star-icon" viewBox="0 0 20 20" aria-hidden="true">
            <polygon points="10,2 12.59,7.36 18.51,8.16 14.25,12.26 15.18,18.09 10,15.34 4.82,18.09 5.75,12.26 1.49,8.16 7.41,7.36"/>
          </svg>
          Favorites <span id="count-fav" class="count">0</span>
        </span>
        <span class="fav-toggle-caret" aria-hidden="true">▾</span>
      </button>
      <div id="favorites-panel" class="favorites-panel" hidden>
        <ul id="list-fav" class="favorites"></ul>
        <p id="fav-empty" class="empty fav-empty" hidden>
          No favorites yet. Tap the star on any item to save it here for next time.
        </p>
      </div>
    </section>

    <section id="list-wrap">
      <div class="list-header">
        <h2>To buy <span id="count-todo" class="count">0</span></h2>
      </div>
      <ul id="list-todo" class="items"></ul>

      <div class="list-header done-header">
        <h2>In the cart <span id="count-done" class="count">0</span></h2>
      </div>
      <ul id="list-done" class="items done"></ul>

      <!-- Big primary "Done shopping" button — clears everything in the cart
           in one tap once you're back from the store. -->
      <button id="done-shopping" type="button" class="done-shopping" hidden>
        Done shopping — clear cart
      </button>

      <p id="empty" class="empty" hidden>Nothing on the list yet. Add the first item above.</p>
    </section>
  </main>

  <div id="conn" class="conn" aria-live="polite"></div>

  <script src="/app.js"></script>
  <script>
    // Service worker registers only on secure contexts (HTTPS or localhost).
    // On plain-HTTP LAN deployments `navigator.serviceWorker` is undefined and this no-ops.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { /* fine — we degrade to online-only */ });
      });
    }
  </script>
</body>
</html>
